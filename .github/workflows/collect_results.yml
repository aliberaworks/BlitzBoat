name: Collect Results

on:
  schedule:
    - cron: '0 13 * * *'  # 22:00 JST (UTC 13:00)
  workflow_dispatch:
    inputs:
      date:
        description: '日付 YYYYMMDD (空欄=今日)'
        required: false

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml numpy scipy scikit-learn pandas python-dotenv

      - name: Collect results
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          HD="${{ github.event.inputs.date }}"
          HD="${HD:-$(TZ=Asia/Tokyo date +%Y%m%d)}"
          echo "結果収集: $HD"
          python collect_results.py --date "$HD"

      - name: Commit results
        run: |
          git config user.name "BlitzBoat Bot"
          git config user.email "bot@blitzboat.dev"
          git add data/results_*.json data/accuracy_log.json || true
          git diff --staged --quiet || git commit -m "Results $(TZ=Asia/Tokyo date +%Y%m%d)"
          git push || true
